backbone:
 - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
 - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
 - [-1, 2, C3k2, [256, False, 0.125]] # 2 ← e: 0.25→0.125，减半
 - [-1, 1, ECALayer, [256]] # 3 ← 零参数注意力补精度
 - [-1, 1, Conv, [256, 3, 2]] # 4-P3/8
 - [-1, 2, C3k2, [512, False, 0.125]] # 5 ← e: 0.25→0.125
 - [-1, 1, ECALayer, [512]] # 6 ← 零参数注意力
 - [-1, 1, Conv, [512, 3, 2]] # 7-P4/16
 - [-1, 2, C3k2, [512, True, 0.5]] # 8 ← e: 1.0→0.5
 - [-1, 1, CoordAtt, [512]] # 9 ← 坐标注意力（轻量）
 - [-1, 1, Conv, [1024, 3, 2]] # 10-P5/32
 - [-1, 2, C3k2, [1024, True, 0.5]] # 11 ← e: 1.0→0.5
 - [-1, 1, SPPF, [1024, 5]] # 12
 - [-1, 2, C2PSA, [1024]] # 13

head:
 - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
 - [[-1, 8], 1, BiFPN_Add2, [512]] # 15 ← BiFPN替换Concat
 - [-1, 2, RepC3, [512]] # 16

