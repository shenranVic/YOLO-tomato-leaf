 - [[-1, 13], 1, BiFPN_Add2, [1024]] # 24 ← BiFPN替换Concat
 - [-1, 2, RepC3, [1024]] # 25 (P5/32-large)

 - [[19, 22, 25], 1, Detect, [nc]]
